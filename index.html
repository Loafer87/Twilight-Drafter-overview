<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI4 Faction Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void:#03020a; --deep:#08051a; --gold:#c9a227; --gold-light:#f0cc6a; --gold-dim:#7a600f;
  --blue-glow:#4da6ff; --green-glow:#44cc77; --text:#d4c8a8; --text-dim:#7a6f55;
  --border:rgba(201,162,39,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--void);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 10%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(1px 1px at 55% 70%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 70% 25%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 55%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 90% 85%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 5% 75%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 35% 90%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 62% 45%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 15% 55%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 47% 30%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 73% 68%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 88% 20%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 20% 95%,rgba(255,255,255,0.3) 0%,transparent 100%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(26,95,160,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 70%,rgba(176,48,48,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 50% 90%,rgba(201,162,39,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{max-width:1100px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
header{text-align:center;margin-bottom:40px}
.title-eyebrow{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(22px,5vw,44px);font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(201,162,39,0.4),0 0 80px rgba(201,162,39,0.15);line-height:1.1;margin-bottom:8px}
.subtitle{font-family:'Cinzel',serif;font-size:13px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.divider{display:flex;align-items:center;gap:16px;margin:20px auto;max-width:400px}
.divider-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim))}
.divider-line:last-child{background:linear-gradient(to left,transparent,var(--gold-dim))}
.divider-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px var(--gold)}

/* TABS */
.tab-nav{display:flex;margin-bottom:32px;border-bottom:1px solid var(--border)}
.tab-btn{padding:12px 28px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* PANEL */
.panel{background:rgba(13,10,37,0.7);border:1px solid var(--border);border-radius:4px;padding:24px;margin-bottom:24px;position:relative;backdrop-filter:blur(8px)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,162,39,0.5),transparent)}
.panel-title{font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:16px}

/* EXPANSION TOGGLES */
.expansion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.exp-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border:1px solid rgba(201,162,39,0.15);border-radius:3px;transition:all 0.2s;user-select:none}
.exp-toggle:hover{border-color:rgba(201,162,39,0.4);background:rgba(201,162,39,0.05)}
.exp-toggle.active{border-color:rgba(201,162,39,0.6);background:rgba(201,162,39,0.08)}
.toggle-box{width:16px;height:16px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.exp-toggle.active .toggle-box{border-color:var(--gold);background:var(--gold)}
.toggle-check{font-size:10px;color:var(--void);font-weight:900;display:none}
.exp-toggle.active .toggle-check{display:block}
.exp-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:500;color:var(--text)}
.exp-count{font-size:11px;color:var(--text-dim);margin-left:auto}

/* PLAYER NAMES */
.player-names-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.name-field{display:flex;flex-direction:column;gap:5px}
.name-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.name-input{background:rgba(255,255,255,0.03);border:1px solid rgba(201,162,39,0.2);border-radius:2px;padding:8px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:500;outline:none;transition:border-color 0.2s;width:100%}
.name-input::placeholder{color:var(--text-dim);opacity:0.5}
.name-input:focus{border-color:rgba(201,162,39,0.55);background:rgba(201,162,39,0.04)}

/* DRAFT CONFIG */
.player-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.player-row label{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-dim);letter-spacing:2px;white-space:nowrap}
.player-stepper{display:flex;align-items:center;border:1px solid var(--border)}
.stepper-btn{width:36px;height:36px;background:transparent;border:none;color:var(--gold);font-size:18px;cursor:pointer;font-family:'Cinzel',serif;transition:background 0.15s;display:flex;align-items:center;justify-content:center}
.stepper-btn:hover{background:rgba(201,162,39,0.1)}
.stepper-val{width:48px;text-align:center;font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold-light);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:4px 0;line-height:28px}
.draft-options{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.option-btn{padding:7px 16px;border:1px solid rgba(201,162,39,0.25);background:transparent;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all 0.2s}
.option-btn.active,.option-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,0.07)}

/* DRAFT BUTTON */
.draft-btn{display:block;width:100%;padding:18px;background:linear-gradient(135deg,rgba(201,162,39,0.15),rgba(201,162,39,0.05));border:1px solid var(--gold);color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all 0.25s;position:relative;overflow:hidden;margin-bottom:24px}
.draft-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,162,39,0.2),transparent);opacity:0;transition:opacity 0.25s}
.draft-btn:hover::before{opacity:1}
.draft-btn:hover{box-shadow:0 0 30px rgba(201,162,39,0.3);text-shadow:0 0 15px rgba(201,162,39,0.6)}
.draft-btn:active{transform:scale(0.99)}

/* RESULTS */
#results{display:none}
.results-header{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold-dim);text-align:center;text-transform:uppercase;margin-bottom:20px}
.player-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.player-card{background:rgba(8,5,26,0.8);border:1px solid var(--border);border-radius:3px;padding:16px}
.player-num{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
.assigned-name{font-family:'Cinzel',serif;font-size:15px;color:var(--gold-light);font-weight:600}
.assigned-exp{font-size:11px;color:var(--text-dim);margin-top:2px;letter-spacing:1px}
.assigned-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.action-btn{padding:10px 24px;border:1px solid;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all 0.2s;text-transform:uppercase}
.action-btn.primary{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,0.08)}
.action-btn.primary:hover{background:rgba(201,162,39,0.15);box-shadow:0 0 20px rgba(201,162,39,0.2)}
.action-btn.secondary{border-color:rgba(255,255,255,0.12);color:var(--text-dim);background:transparent}
.action-btn.secondary:hover{border-color:rgba(255,255,255,0.25);color:var(--text)}
.warning{font-size:13px;color:#cc8800;font-family:'Rajdhani',sans-serif;text-align:center;padding:10px;border:1px solid rgba(204,136,0,0.3);border-radius:3px;margin-bottom:16px}
.status-bar{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:12px}
.status-bar span{color:var(--gold);font-weight:600}

/* FINAL CARDS */
.final-card{background:rgba(8,5,26,0.85);border:1px solid var(--border);border-radius:3px;padding:20px;opacity:0;transform:translateY(30px);transition:opacity 0.5s ease,transform 0.5s ease;position:relative;overflow:hidden}
.final-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.5}
.final-card.revealed{opacity:1;transform:translateY(0)}

/* FACTION ROWS — clickable tip toggle */
.faction-row{cursor:pointer;border-radius:2px;margin-bottom:8px}
.faction-row:last-child{margin-bottom:0}
.faction-row-main{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:2px;transition:background 0.15s}
.faction-row:hover .faction-row-main{background:rgba(201,162,39,0.05)}
.faction-row-chevron{font-size:9px;color:var(--text-dim);margin-left:auto;transition:transform 0.2s;flex-shrink:0}
.faction-row.open .faction-row-chevron{transform:rotate(180deg)}
.faction-row-tip{display:none;padding:8px 10px 10px 26px;border-left:2px solid rgba(201,162,39,0.2);margin:0 8px 4px 8px;font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.5;animation:tipSlide 0.2s ease}
.faction-row.open .faction-row-tip{display:block}
@keyframes tipSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* PLAYSTYLE TAGS */
.playstyle-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-bottom:2px;font-style:normal}
.tag-beginner{background:rgba(68,204,119,0.15);color:#44cc77}
.tag-political{background:rgba(77,166,255,0.15);color:#4da6ff}
.tag-military{background:rgba(255,80,80,0.15);color:#ff6060}
.tag-economic{background:rgba(201,162,39,0.15);color:#c9a227}
.tag-tech{background:rgba(160,80,200,0.15);color:#c080ff}
.tag-tricky{background:rgba(255,140,0,0.15);color:#ff8c00}
.faction-row-tip-tag{margin-bottom:4px;display:block}

/* PICK MODE */
.faction-options{display:flex;flex-direction:column;gap:6px}
.faction-option{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid rgba(255,255,255,0.06);border-radius:2px;cursor:pointer;transition:all 0.18s}
.faction-option:hover{border-color:rgba(201,162,39,0.3);background:rgba(201,162,39,0.04)}
.faction-option.selected{border-color:var(--gold);background:rgba(201,162,39,0.1)}
.faction-option.locked{opacity:0.35;cursor:not-allowed;pointer-events:none}
.faction-color{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.faction-name-text{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:500;color:var(--text);flex:1}
.faction-exp-badge{font-size:9px;letter-spacing:1px;padding:2px 5px;border-radius:2px;font-weight:600;text-transform:uppercase;background:rgba(255,255,255,0.08);color:var(--text-dim)}
.faction-scroll{max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
.faction-scroll::-webkit-scrollbar{width:3px}
.faction-scroll::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.confirm-btn{padding:8px 20px;border:1px solid var(--green-glow, #44cc77);background:rgba(26,122,58,0.15);color:#44cc77;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all 0.2s;text-transform:uppercase;margin-top:10px;width:100%}
.confirm-btn:hover{background:rgba(26,122,58,0.25);box-shadow:0 0 15px rgba(68,204,119,0.2)}
.confirm-btn:disabled{opacity:0.3;cursor:not-allowed}

/* SPEAKER ORDER */
#speaker-section{margin-top:32px}
.speaker-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,rgba(77,166,255,0.1),rgba(77,166,255,0.03));border:1px solid rgba(77,166,255,0.4);color:#4da6ff;font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all 0.25s;margin-bottom:16px}
.speaker-btn:hover{box-shadow:0 0 25px rgba(77,166,255,0.25);background:linear-gradient(135deg,rgba(77,166,255,0.15),rgba(77,166,255,0.05))}
.speaker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.speaker-card{background:rgba(8,5,26,0.8);border:1px solid rgba(77,166,255,0.2);border-radius:3px;padding:14px 16px;display:flex;align-items:center;gap:14px;animation:fadeUp 0.4s ease both}
.speaker-num{font-family:'Cinzel Decorative',serif;font-size:22px;color:#4da6ff;text-shadow:0 0 20px rgba(77,166,255,0.5);min-width:32px;text-align:center;line-height:1}
.speaker-num.first{color:var(--gold-light);text-shadow:0 0 20px rgba(201,162,39,0.6)}
.speaker-info{flex:1}
.speaker-name{font-family:'Cinzel',serif;font-size:14px;color:var(--text);font-weight:600}
.speaker-faction{font-size:12px;color:var(--text-dim);margin-top:2px;display:flex;align-items:center;gap:6px}
.speaker-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.speaker-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;opacity:0.7}

/* LOADING */
#loading-overlay{display:none;position:fixed;inset:0;background:var(--void);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:32px}
#loading-overlay.active{display:flex}
.ring-outer{animation:spinSlow 8s linear infinite;transform-origin:center}
.ring-inner{animation:spinSlow 5s linear infinite reverse;transform-origin:center}
.hex-core{animation:hexPulse 2s ease-in-out infinite;transform-origin:center}
.scan-line{animation:scanRot 2s linear infinite;transform-origin:center}
.warp-lines{animation:spinSlow 3s linear infinite;transform-origin:center}
.node-dot{animation:nodePulse 2s ease-in-out infinite}
.node-dot:nth-child(2){animation-delay:0.33s}
.node-dot:nth-child(3){animation-delay:0.66s}
.node-dot:nth-child(4){animation-delay:1s}
.node-dot:nth-child(5){animation-delay:1.33s}
.node-dot:nth-child(6){animation-delay:1.66s}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes hexPulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes scanRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes nodePulse{0%,100%{opacity:0.3}50%{opacity:1}}
.loader-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 30px rgba(201,162,39,0.6);animation:titlePulse 2s ease-in-out infinite}
.loader-sub{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;animation:subFade 1.5s ease-in-out infinite;margin-top:-20px}
@keyframes titlePulse{0%,100%{opacity:0.7}50%{opacity:1}}
@keyframes subFade{0%,100%{opacity:0.3}50%{opacity:0.8}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* CHEAT SHEET */
.cs-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.cs-search{flex:1;min-width:200px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:2px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
.cs-search:focus{border-color:rgba(201,162,39,0.5)}
.cs-search::placeholder{color:var(--text-dim);opacity:0.5}
.cs-filter{padding:8px 14px;border:1px solid rgba(201,162,39,0.2);background:transparent;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:2px;transition:all 0.2s;white-space:nowrap}
.cs-filter.active,.cs-filter:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,0.07)}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.cs-card{background:rgba(8,5,26,0.85);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color 0.2s}
.cs-card:hover{border-color:rgba(201,162,39,0.45)}
.cs-card.unverified{border-color:rgba(255,140,0,0.3)}
.cs-card.unverified:hover{border-color:rgba(255,140,0,0.6)}
.cs-color-bar{height:3px}
.cs-header{display:flex;align-items:stretch;min-height:84px;position:relative;overflow:hidden}
.cs-faction-img{width:84px;height:84px;object-fit:cover;flex-shrink:0;filter:saturate(0.75) brightness(0.8)}
.cs-faction-img-placeholder{width:84px;height:84px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:0.35}
.cs-header-info{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center}
.cs-faction-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold-light);line-height:1.2;margin-bottom:6px}
.cs-badges{display:flex;gap:5px;flex-wrap:wrap}
.cs-exp-badge{font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;font-weight:700;text-transform:uppercase;background:rgba(255,255,255,0.07);color:var(--text-dim)}
.cs-unverified-badge{font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;font-weight:700;background:rgba(255,140,0,0.15);color:#ff8c00}
.cs-body{padding:14px;border-top:1px solid rgba(255,255,255,0.05)}
.cs-section{margin-bottom:12px}
.cs-section:last-child{margin-bottom:0}
.cs-section-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:5px}
.cs-text{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text);line-height:1.5}
.cs-tech-list{display:flex;flex-direction:column;gap:4px}
.cs-tech{display:flex;align-items:flex-start;gap:7px;font-size:13px;line-height:1.4}
.cs-tech-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tech-red{background:#cc4444}.tech-blue{background:#4488cc}.tech-green{background:#44aa66}.tech-yellow{background:#ccaa22}
.cs-tech-name{color:var(--text);font-weight:600;font-family:'Rajdhani',sans-serif}
.cs-tech-desc{color:var(--text-dim);font-family:'Rajdhani',sans-serif}
.cs-flagship{background:rgba(201,162,39,0.05);border:1px solid rgba(201,162,39,0.15);border-radius:3px;padding:8px 10px}
.cs-flagship-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);margin-bottom:3px}

    techs:[{color:"red",name:"Planesplitter",desc:"Force The Fracture into play. Verify exact text."},{color:"red",name:"Obsidian Counterpart",desc:"Move ingress tokens controlling entry into The Fracture. Verify exact text."}],
    commander:{name:"Aroz Hollow",ability:"Boosts combat rolls of units in The Fracture. Verify exact text."},
    hero:{name:"Unknown",ability:"Verify against your faction sheet."},
    playstyle:"Former Mahact thralls who fight through a dimensional rift. Force enemies into The Fracture for brutal close-quarters combat."},
  {id:"ralnelconsortium",name:"The Ral Nel Consortium",exp:"te",color:"#c08030",unverified:true,emoji:"🤝",
    abilities:["Trade-focused abilities — verify exact ability text against your faction sheet."],
    flagship:{name:"Unknown",stats:"Verify against faction sheet",ability:"Trade-related ability. Verify against your faction sheet."},
    techs:[{color:"yellow",name:"Consortium Protocol",desc:"Gain trade goods when players trade through you. Verify exact text."}],
    commander:{name:"Unknown",ability:"Verify against your faction sheet."},
    hero:{name:"Unknown",ability:"Verify against your faction sheet."},
    playstyle:"Trade specialists who profit from being the hub of galactic commerce. The more everyone deals, the richer they get."},
  {id:"firmament",name:"The Firmament / The Obsidian",exp:"te",color:"#7060a0",unverified:true,emoji:"⚖️",
    abilities:["PUPPETS OF THE BLADE: If you have at least one plot card in your play area — ACTION: Purge the Firmament faction sheet, leaders, planet card, and promissory note, then gain all faction components for The Obsidian.","NOCTURNE: This faction cannot be chosen during setup.","THE BLADE'S ORCHESTRA: When this faction comes into play, flip your home system and double-sided faction components, then ready Cronos Hollow and Tallin Hollow if you control them.","MARIONETTES: The player or players whose control tokens are on each plot card are the puppeted players for that plot."],
    flagship:{name:"Unknown",stats:"Verify against faction sheet",ability:"Dual-faction mechanic. Verify against your faction sheet."},
    techs:[{color:"yellow",name:"The Sowing / The Reaping",desc:"Invest trade goods as Firmament to gain double back as Obsidian."},{color:"red",name:"Viper EX-23 (Firmament Mech)",desc:"Can borrow Deepwrought coexistence ability."},{color:"red",name:"Viper Hollow (Obsidian Mech)",desc:"Flips control of coexisted planets."}],
    commander:{name:"Unknown",ability:"Verify against your faction sheet."},
    hero:{name:"Unknown",ability:"Verify against your faction sheet."},
    playstyle:"A dual-faction that transforms mid-game. Invest resources as the Firmament, then flip to The Obsidian to harvest them doubled."},
  // Discordant Stars — playstyle tips only, no full data
];

// Remove the DS placeholder — DS factions show playstyle only via FACTION_TIPS lookup
// We handle DS factions in the guide by generating minimal cards from FACTIONS.ds

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  players:6, perPlayer:3, mode:"random",
  expansions:{base:true,pok:false,codex3:false,te:false,ds:false},
  names:["","","","","","","",""],
  draftPool:[], assignments:[], currentPlayer:0, finalFactions:[],
};
let guideFilter = "all";
let animFrame = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function factionColor(n){return FACTION_COLORS[n]||"#888"}
function getExpName(n){for(const[k,arr]of Object.entries(FACTIONS)){if(arr.includes(n)){const e=EXPANSIONS.find(x=>x.id===k);return e?e.name:""}}return ""}
function getExpId(n){for(const[k,arr]of Object.entries(FACTIONS)){if(arr.includes(n))return k}return "base"}
function playerName(i){return(state.names[i]&&state.names[i].trim())?state.names[i].trim():`Player ${i+1}`}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getAvailable(){let p=[];Object.keys(state.expansions).forEach(k=>{if(state.expansions[k])p=p.concat(FACTIONS[k])});return p}
function expBadge(n){const id=getExpId(n);const e=EXPANSIONS.find(x=>x.id===id);if(!e||id==="base")return "";return `<span class="faction-exp-badge">${e.short}</span>`}

// ── FACTION ROW (clickable tip) ───────────────────────────────────────────────
function factionRowHTML(name){
  const tip=FACTION_TIPS[name];
  const dot=`<div class="assigned-dot" style="background:${factionColor(name)}"></div>`;
  const info=`<div style="flex:1"><div class="assigned-name">${name}</div><div class="assigned-exp">${getExpName(name)}</div></div>`;
  const tag=tip?`<span class="playstyle-tag tag-${tip.tag}">${TAG_LABELS[tip.tag]}</span>`:"";
  const chev=tip?`<span class="faction-row-chevron">▼</span>`:"";
  const tipBlock=tip?`<div class="faction-row-tip"><span class="faction-row-tip-tag playstyle-tag tag-${tip.tag}">${TAG_LABELS[tip.tag]}</span>${tip.tip}</div>`:"";
  return `<div class="faction-row" onclick="toggleFactionTip(this)"><div class="faction-row-main">${dot}${info}${tag}${chev}</div>${tipBlock}</div>`;
}
function toggleFactionTip(el){el.classList.toggle("open")}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(id,btn){
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  btn.classList.add("active");
  if(id==="guide")renderGuide();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){renderExpansions();renderNames()}

function renderExpansions(){
  const g=document.getElementById("exp-grid");
  g.innerHTML="";
  EXPANSIONS.forEach(exp=>{
    const count=FACTIONS[exp.id].length;
    const active=state.expansions[exp.id];
    const el=document.createElement("div");
    el.className="exp-toggle"+(active?" active":"");
    if(exp.required)el.style.opacity="0.6";
    el.innerHTML=`<div class="toggle-box"><span class="toggle-check">✓</span></div><span class="exp-name">${exp.name}</span><span class="exp-count">${count}f</span>`;
    if(!exp.required)el.onclick=()=>{state.expansions[exp.id]=!state.expansions[exp.id];el.classList.toggle("active",state.expansions[exp.id])};
    g.appendChild(el);
  });
}
function renderNames(){
  const g=document.getElementById("names-grid");g.innerHTML="";
  for(let i=0;i<state.players;i++){
    const f=document.createElement("div");f.className="name-field";
    f.innerHTML=`<div class="name-label">Player ${i+1}</div><input class="name-input" type="text" maxlength="20" placeholder="Enter name..." value="${state.names[i]||""}" oninput="state.names[${i}]=this.value.trim()">`;
    g.appendChild(f);
  }
}
function adjustPlayers(d){state.players=Math.max(2,Math.min(8,state.players+d));document.getElementById("player-count").textContent=state.players;renderNames()}
function adjustPerPlayer(d){state.perPlayer=Math.max(1,Math.min(5,state.perPlayer+d));document.getElementById("per-player-count").textContent=state.perPlayer}
function setMode(m){state.mode=m;document.getElementById("mode-random").classList.toggle("active",m==="random");document.getElementById("mode-draft").classList.toggle("active",m==="draft")}

// ── LOADING ───────────────────────────────────────────────────────────────────
const LOADER_LINES=["Scanning the galaxy...","Consulting the oracle...","Aligning hyperlanes...","Awakening ancient races...","Charting the Mecatol system...","Shuffling the fates...","The Prophecy stirs..."];

// ── DRAFT ─────────────────────────────────────────────────────────────────────
function startDraft(){
  const available=getAvailable();
  const overlay=document.getElementById("loading-overlay");
  const subText=document.getElementById("loader-sub-text");
  overlay.classList.add("active");
  let li=0;
  const cyc=setInterval(()=>{li=(li+1)%LOADER_LINES.length;subText.textContent=LOADER_LINES[li]},400);
  setTimeout(()=>{
    clearInterval(cyc);overlay.classList.remove("active");
    document.getElementById("config-panel").style.display="none";
    document.getElementById("results").style.display="block";
    document.getElementById("speaker-section").style.display="none";
    document.getElementById("speaker-results").innerHTML="";
    if(state.mode==="random")doRandomDraft(available);
    else doDraftMode(available);
  },2200);
}

function revealCards(container,onDone){
  const cards=container.querySelectorAll(".final-card");
  cards.forEach((c,i)=>setTimeout(()=>{c.classList.add("revealed");if(i===cards.length-1&&onDone)onDone()},150+i*200));
}

function doRandomDraft(available){
  document.getElementById("results-random").style.display="block";
  document.getElementById("results-draft").style.display="none";
  const shuffled=shuffle(available);
  const needed=state.players*state.perPlayer;
  const warn=needed>available.length;
  const container=document.getElementById("random-results");
  container.innerHTML="";
  if(warn){const w=document.createElement("div");w.className="warning";w.textContent=`⚠ Only ${available.length} factions available — some players may receive fewer options.`;container.before(w)}
  state.finalFactions=[];
  for(let p=0;p<state.players;p++){
    const pf=shuffled.slice(p*state.perPlayer,(p+1)*state.perPlayer);
    state.finalFactions.push({name:playerName(p),faction:pf[0]||null});
    const card=document.createElement("div");
    card.className="final-card";
    card.innerHTML=`<div class="player-num">${playerName(p)}</div>${pf.map(f=>factionRowHTML(f)).join("")}`;
    container.appendChild(card);
  }
  revealCards(container,()=>{document.getElementById("speaker-section").style.display="block"});
}

function doDraftMode(available){
  document.getElementById("results-random").style.display="none";
  document.getElementById("results-draft").style.display="block";
  const needed=state.players*state.perPlayer;
  const shuffled=shuffle(available);
  const pool=shuffled.slice(0,Math.min(needed,available.length));
  state.draftPool=pool;
  state.assignments=Array.from({length:state.players},(_,i)=>({player:i+1,name:playerName(i),factionOptions:pool.slice(i*state.perPlayer,(i+1)*state.perPlayer),chosen:null}));
  state.currentPlayer=0;state.finalFactions=[];
  const warn=needed>available.length;
  const we=document.getElementById("draft-warning");
  if(warn){we.style.display="block";we.textContent=`⚠ Only ${available.length} factions available — some players may have fewer choices.`}else we.style.display="none";
  renderDraftState();
}

function renderDraftState(){
  updateDraftStatus();
  const container=document.getElementById("draft-results");
  container.innerHTML="";
  state.assignments.forEach((a,idx)=>{
    const card=document.createElement("div");card.className="player-card";
    if(a.chosen){
      card.innerHTML=`<div class="player-num">${a.name}</div>${factionRowHTML(a.chosen)}`;
    } else if(idx===state.currentPlayer){
      card.style.borderColor="rgba(201,162,39,0.5)";card.style.background="rgba(201,162,39,0.05)";
      const chosen=state.assignments.filter(x=>x.chosen).map(x=>x.chosen);
      card.innerHTML=`<div class="player-num" style="color:var(--gold)">${a.name} — Choose Your Faction</div>
        <div class="faction-scroll"><div class="faction-options" id="opts-${idx}">
          ${a.factionOptions.map(f=>{
            const locked=chosen.includes(f);
            return `<div class="faction-option${locked?" locked":""}" onclick="selectFaction(${idx},'${f.replace(/'/g,"\\'")}')">
              <div class="faction-color" style="background:${factionColor(f)}"></div>
              <div style="flex:1"><div class="faction-name-text">${f}</div><div style="font-size:11px;color:var(--text-dim)">${getExpName(f)}</div></div>
              ${expBadge(f)}
            </div>`;
          }).join("")}
        </div></div>
        <button class="confirm-btn" id="conf-${idx}" disabled onclick="confirmFaction(${idx})">Confirm Selection</button>`;
    } else {
      card.style.opacity="0.5";
      card.innerHTML=`<div class="player-num">${a.name}</div><div style="font-size:13px;color:var(--text-dim);font-style:italic">Awaiting their turn...</div>`;
    }
    container.appendChild(card);
  });
}

let pendingChoice={};
function selectFaction(pi,f){
  pendingChoice[pi]=f;
  document.querySelectorAll(`#opts-${pi} .faction-option`).forEach(el=>el.classList.toggle("selected",el.querySelector(".faction-name-text").textContent===f));
  const btn=document.getElementById(`conf-${pi}`);if(btn)btn.disabled=false;
}
function confirmFaction(pi){
  const f=pendingChoice[pi];if(!f)return;
  state.assignments[pi].chosen=f;delete pendingChoice[pi];state.currentPlayer++;
  if(state.currentPlayer>=state.players)showFinalResults();else renderDraftState();
}
function showFinalResults(){
  document.getElementById("results-draft").style.display="none";
  document.getElementById("results-random").style.display="block";
  document.getElementById("results-random").querySelector(".results-header").textContent="— Factions Chosen —";
  const container=document.getElementById("random-results");container.innerHTML="";state.finalFactions=[];
  state.assignments.forEach(a=>{
    state.finalFactions.push({name:a.name,faction:a.chosen});
    const card=document.createElement("div");card.className="final-card";
    card.innerHTML=`<div class="player-num">${a.name}</div>${factionRowHTML(a.chosen)}`;
    container.appendChild(card);
  });
  revealCards(container,()=>{document.getElementById("speaker-section").style.display="block"});
}
function updateDraftStatus(){
  const done=state.assignments.filter(a=>a.chosen).length;
  const el=document.getElementById("draft-status");
  if(el)el.innerHTML=`<span>${done}</span> of <span>${state.players}</span> players selected · <span>${state.assignments[state.currentPlayer]?.name||""}</span> is choosing`;
}

// ── SPEAKER ORDER ─────────────────────────────────────────────────────────────
function rollSpeakerOrder(){
  const shuffled=shuffle([...state.finalFactions]);
  const container=document.getElementById("speaker-results");
  container.innerHTML=`<div class="speaker-label">▸ Speaker Order</div><div class="speaker-grid" id="spk-cards"></div>`;
  const grid=document.getElementById("spk-cards");
  shuffled.forEach((p,i)=>{
    const card=document.createElement("div");card.className="speaker-card";card.style.animationDelay=(i*0.1)+"s";
    const first=i===0;
    card.innerHTML=`<div class="speaker-num${first?" first":""}">${i+1}</div>
      <div class="speaker-info">
        <div class="speaker-name">${p.name}</div>
        <div class="speaker-faction">${p.faction?`<div class="speaker-dot" style="background:${factionColor(p.faction)}"></div>${p.faction}`:"—"}</div>
      </div>
      ${first?`<div style="font-size:10px;letter-spacing:2px;color:var(--gold);font-family:'Cinzel',serif">SPEAKER</div>`:""}`;
    grid.appendChild(card);
  });
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetAll(){
  document.getElementById("config-panel").style.display="block";
  document.getElementById("results").style.display="none";
  document.getElementById("results-random").style.display="none";
  document.getElementById("results-draft").style.display="none";
  document.getElementById("random-results").innerHTML="";
  document.getElementById("speaker-results").innerHTML="";
  document.getElementById("speaker-section").style.display="none";
  const rh=document.querySelector("#results-random .results-header");if(rh)rh.textContent="— The Galaxy Has Spoken —";
  const old=document.querySelector(".container>.warning");if(old)old.remove();
  state.currentPlayer=0;state.finalFactions=[];pendingChoice={};
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
}

// ── FACTION GUIDE ─────────────────────────────────────────────────────────────
function setGuideFilter(btn,f){
  guideFilter=f;
  document.querySelectorAll(".cs-filter").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderGuide();
}

function expLabel(exp){return{base:"Base Game",pok:"Prophecy of Kings",codex3:"Codex III",te:"Thunder's Edge",ds:"Discordant Stars"}[exp]||exp}

function renderGuide(){
  const query=(document.getElementById("cs-search")?.value||"").toLowerCase();
  const grid=document.getElementById("cs-grid");if(!grid)return;
  // Combine FACTION_DB entries with DS factions (playstyle-only)
  const dbIds=new Set(FACTION_DB.map(f=>f.id));
  const allEntries=[...FACTION_DB];
  // Add DS factions as minimal entries
  FACTIONS.ds.forEach(name=>{
    allEntries.push({id:"ds_"+name.replace(/\s/g,"_"),name,exp:"ds",color:factionColor(name),emoji:"⬡",_dsOnly:true});
  });
  const filtered=allEntries.filter(f=>{
    const matchFilter=guideFilter==="all"||f.exp===guideFilter;
    const tip=FACTION_TIPS[f.name];
    const searchStr=f.name.toLowerCase()+" "+(tip?tip.tip.toLowerCase():"")+" "+(f.playstyle||"").toLowerCase();
    const matchSearch=!query||searchStr.includes(query);
    return matchFilter&&matchSearch;
  });
  if(!filtered.length){grid.innerHTML='<div class="cs-empty">No factions match your search.</div>';return}
  grid.innerHTML=filtered.map(f=>guideCardHTML(f)).join("");
}

function guideCardHTML(f){
  const tip=FACTION_TIPS[f.name];
  const colorBar=`<div class="cs-color-bar" style="background:${f.color};opacity:0.8"></div>`;
  const placeholder=`<div class="cs-faction-img-placeholder">${f.emoji||"⬡"}</div>`;
  const badges=`<div class="cs-badges">
    <span class="cs-exp-badge">${expLabel(f.exp)}</span>
    ${f.unverified?'<span class="cs-unverified-badge">⚠ Verify stats</span>':""}
    ${tip?`<span class="playstyle-tag tag-${tip.tag}">${TAG_LABELS[tip.tag]}</span>`:""}
  </div>`;
  const header=`<div class="cs-header" style="background:linear-gradient(135deg,${f.color}18,transparent)">
    ${placeholder}
    <div class="cs-header-info">
      <div class="cs-faction-name">${f.name}</div>
      ${badges}
    </div>
  </div>`;
  if(f._dsOnly){
    // DS-only card: playstyle tip only
    return `<div class="cs-card">${colorBar}${header}
      <div class="cs-body">
        ${tip?`<div class="cs-section"><div class="cs-section-label">Playstyle</div><div class="cs-text">${tip.tip}</div></div>`:""}
        <div class="cs-section"><div class="cs-text" style="color:var(--text-dim);font-style:italic;font-size:12px">Full faction data for Discordant Stars not included — refer to your faction sheet.</div></div>
      </div></div>`;
  }
  const abilities=f.abilities.map(a=>`<div class="cs-ability">${a}</div>`).join("");
  const techs=f.techs.map(t=>`<div class="cs-tech"><div class="cs-tech-dot tech-${t.color}"></div><div><span class="cs-tech-name">${t.name}: </span><span class="cs-tech-desc">${t.desc}</span></div></div>`).join("");
  const leaders=[
    f.commander?`<div class="cs-leader"><div class="cs-leader-role">Commander</div><div class="cs-leader-body"><div class="cs-leader-name">${f.commander.name}</div><div class="cs-leader-ability">${f.commander.ability}</div></div></div>`:"",
    f.hero?`<div class="cs-leader"><div class="cs-leader-role">Hero</div><div class="cs-leader-body"><div class="cs-leader-name">${f.hero.name}</div><div class="cs-leader-ability">${f.hero.ability}</div></div></div>`:"",
  ].join("");
  return `<div class="cs-card${f.unverified?" unverified":""}">${colorBar}${header}
    <div class="cs-body">
      ${tip?`<div class="cs-section"><div class="cs-section-label">Playstyle</div><div class="cs-text">${tip.tip}</div></div>`:""}
      <div class="cs-section"><div class="cs-section-label">Faction Abilities</div>${abilities}</div>
      <div class="cs-section"><div class="cs-section-label">Flagship — ${f.flagship.name}</div>
        <div class="cs-flagship"><div class="cs-flagship-stats">${f.flagship.stats}</div><div class="cs-flagship-ability">${f.flagship.ability}</div></div>
      </div>
      <div class="cs-section"><div class="cs-section-label">Faction Technologies</div><div class="cs-tech-list">${techs}</div></div>
      <div class="cs-section"><div class="cs-section-label">Leaders</div>${leaders}</div>
    </div></div>`;
}
