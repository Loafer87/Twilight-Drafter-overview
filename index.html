<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI4 Faction Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #03020a;
    --deep: #08051a;
    --nebula: #0d0a25;
    --gold: #c9a227;
    --gold-light: #f0cc6a;
    --gold-dim: #7a600f;
    --red: #b03030;
    --red-glow: #ff4444;
    --blue: #1a5fa0;
    --blue-glow: #4da6ff;
    --green: #1a7a3a;
    --green-glow: #44cc77;
    --text: #d4c8a8;
    --text-dim: #7a6f55;
    --border: rgba(201, 162, 39, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 47% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 73% 68%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 95%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(26, 95, 160, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(176, 48, 48, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 90%, rgba(201, 162, 39, 0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .title-eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 5vw, 44px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201, 162, 39, 0.4), 0 0 80px rgba(201, 162, 39, 0.15);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 20px auto;
    max-width: 400px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
  }

  .divider-line:last-child {
    background: linear-gradient(to left, transparent, var(--gold-dim));
  }

  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Panel */
  .panel {
    background: rgba(13, 10, 37, 0.7);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    backdrop-filter: blur(8px);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201, 162, 39, 0.5), transparent);
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 16px;
  }

  /* Expansion toggles */
  .expansion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .exp-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid rgba(201, 162, 39, 0.15);
    border-radius: 3px;
    transition: all 0.2s;
    user-select: none;
  }

  .exp-toggle:hover {
    border-color: rgba(201, 162, 39, 0.4);
    background: rgba(201, 162, 39, 0.05);
  }

  .exp-toggle.active {
    border-color: rgba(201, 162, 39, 0.6);
    background: rgba(201, 162, 39, 0.08);
  }

  .toggle-box {
    width: 16px;
    height: 16px;
    border: 1px solid var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .exp-toggle.active .toggle-box {
    border-color: var(--gold);
    background: var(--gold);
  }

  .toggle-check {
    font-size: 10px;
    color: var(--void);
    font-weight: 900;
    display: none;
  }

  .exp-toggle.active .toggle-check { display: block; }

  .exp-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .exp-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* Player config */
  .player-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .player-row label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .player-stepper {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
  }

  .stepper-btn {
    width: 36px;
    height: 36px;
    background: transparent;
    border: none;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stepper-btn:hover { background: rgba(201, 162, 39, 0.1); }

  .stepper-val {
    width: 48px;
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold-light);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 4px 0;
    line-height: 28px;
  }

  .draft-options {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .option-btn {
    padding: 7px 16px;
    border: 1px solid rgba(201, 162, 39, 0.25);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .option-btn.active, .option-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 162, 39, 0.07);
  }

  /* Draft button */
  .draft-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, rgba(201,162,39,0.15), rgba(201,162,39,0.05));
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .draft-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,162,39,0.2), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .draft-btn:hover::before { opacity: 1; }
  .draft-btn:hover {
    box-shadow: 0 0 30px rgba(201, 162, 39, 0.3);
    text-shadow: 0 0 15px rgba(201, 162, 39, 0.6);
  }

  .draft-btn:active { transform: scale(0.99); }

  /* Results */
  #results { display: none; }

  .results-header {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .player-results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .player-card {
    background: rgba(8, 5, 26, 0.8);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    animation: fadeUp 0.5s ease both;
  }

  .player-card:nth-child(1) { animation-delay: 0.05s; }
  .player-card:nth-child(2) { animation-delay: 0.1s; }
  .player-card:nth-child(3) { animation-delay: 0.15s; }
  .player-card:nth-child(4) { animation-delay: 0.2s; }
  .player-card:nth-child(5) { animation-delay: 0.25s; }
  .player-card:nth-child(6) { animation-delay: 0.3s; }
  .player-card:nth-child(7) { animation-delay: 0.35s; }
  .player-card:nth-child(8) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .player-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Draft mode: faction options per player */
  .faction-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .faction-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
  }

  .faction-option:hover {
    border-color: rgba(201, 162, 39, 0.3);
    background: rgba(201, 162, 39, 0.04);
  }

  .faction-option.selected {
    border-color: var(--gold);
    background: rgba(201, 162, 39, 0.1);
  }

  .faction-option.locked {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .faction-color {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .faction-name-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .faction-exp-badge {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 5px;
    border-radius: 2px;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* Assigned faction display */
  .assigned-faction {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .assigned-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .assigned-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--gold-light);
    font-weight: 600;
  }

  .assigned-exp {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Pool display */
  .pool-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .pool-chip {
    padding: 4px 10px;
    border: 1px solid rgba(201, 162, 39, 0.2);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .pool-chip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  /* Action row */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 10px 24px;
    border: 1px solid;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .action-btn.primary {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 162, 39, 0.08);
  }

  .action-btn.primary:hover {
    background: rgba(201, 162, 39, 0.15);
    box-shadow: 0 0 20px rgba(201, 162, 39, 0.2);
  }

  .action-btn.secondary {
    border-color: rgba(255,255,255,0.12);
    color: var(--text-dim);
    background: transparent;
  }

  .action-btn.secondary:hover {
    border-color: rgba(255,255,255,0.25);
    color: var(--text);
  }

  .status-bar {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 12px;
  }

  .status-bar span { color: var(--gold); font-weight: 600; }

  /* Confirm button */
  .confirm-btn {
    padding: 8px 20px;
    border: 1px solid var(--green-glow);
    background: rgba(26, 122, 58, 0.15);
    color: var(--green-glow);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
    margin-top: 10px;
    width: 100%;
  }

  .confirm-btn:hover {
    background: rgba(26, 122, 58, 0.25);
    box-shadow: 0 0 15px rgba(68, 204, 119, 0.2);
  }

  .confirm-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Final results */
  .final-card {
    background: rgba(8, 5, 26, 0.85);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .final-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .warning {
    font-size: 12px;
    color: #cc8800;
    font-family: 'Rajdhani', sans-serif;
    text-align: center;
    padding: 10px;
    border: 1px solid rgba(204, 136, 0, 0.3);
    border-radius: 3px;
    margin-bottom: 16px;
  }

  /* Player name inputs */
  .player-names-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .name-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .name-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .name-input {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201, 162, 39, 0.2);
    border-radius: 2px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .name-input::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  .name-input:focus {
    border-color: rgba(201, 162, 39, 0.55);
    background: rgba(201, 162, 39, 0.04);
  }

  /* Loading overlay */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--void);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 32px;
  }

  #loading-overlay.active { display: flex; }

  .loader-svg {
    width: 200px;
    height: 200px;
    position: relative;
  }

  /* Outer ring */
  .ring-outer {
    animation: spinSlow 8s linear infinite;
    transform-origin: center;
  }

  /* Inner ring */
  .ring-inner {
    animation: spinSlow 5s linear infinite reverse;
    transform-origin: center;
  }

  /* Hex pulse */
  .hex-core {
    animation: hexPulse 2s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes hexPulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.06); }
  }

  /* Scanning line */
  .scan-line {
    animation: scan 2s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes scan {
    0%   { transform: rotate(0deg);   opacity: 1; }
    100% { transform: rotate(360deg); opacity: 1; }
  }

  /* Node dots on outer ring */
  .node-dot {
    animation: nodePulse 2s ease-in-out infinite;
  }
  .node-dot:nth-child(2) { animation-delay: 0.33s; }
  .node-dot:nth-child(3) { animation-delay: 0.66s; }
  .node-dot:nth-child(4) { animation-delay: 1s; }
  .node-dot:nth-child(5) { animation-delay: 1.33s; }
  .node-dot:nth-child(6) { animation-delay: 1.66s; }

  @keyframes nodePulse {
    0%, 100% { opacity: 0.3; r: 3; }
    50%       { opacity: 1;   r: 5; }
  }

  .loader-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(201, 162, 39, 0.6);
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1; }
  }

  .loader-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
    animation: subFade 1.5s ease-in-out infinite;
    margin-top: -20px;
  }

  @keyframes subFade {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 0.8; }
  }

  /* Warp lines burst */
  .warp-lines {
    position: absolute;
    inset: 0;
    animation: warpSpin 3s linear infinite;
    transform-origin: center;
  }

  @keyframes warpSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Playstyle tooltip */
  .faction-tip {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 4px;
    line-height: 1.4;
    padding-left: 18px;
    border-left: 2px solid rgba(201,162,39,0.2);
  }

  .playstyle-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-bottom: 4px;
    font-style: normal;
  }

  .tag-beginner  { background: rgba(68,204,119,0.15); color: #44cc77; }
  .tag-political { background: rgba(77,166,255,0.15); color: #4da6ff; }
  .tag-military  { background: rgba(255,80,80,0.15);  color: #ff6060; }
  .tag-economic  { background: rgba(201,162,39,0.15); color: #c9a227; }
  .tag-tech      { background: rgba(160,80,200,0.15); color: #c080ff; }
  .tag-tricky    { background: rgba(255,140,0,0.15);  color: #ff8c00; }

  /* Faction option with tip */
  .faction-option .faction-tip { display: none; }
  .faction-option.selected .faction-tip { display: block; }

  /* Final card tip */
  .final-tip {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid rgba(201,162,39,0.25);
    border-radius: 0 2px 2px 0;
    line-height: 1.5;
  }

  /* Speaker order section */
  #speaker-section {
    margin-top: 32px;
  }

  .speaker-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(77,166,255,0.1), rgba(77,166,255,0.03));
    border: 1px solid rgba(77,166,255,0.4);
    color: #4da6ff;
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
    margin-bottom: 16px;
  }

  .speaker-btn:hover {
    box-shadow: 0 0 25px rgba(77,166,255,0.25);
    background: linear-gradient(135deg, rgba(77,166,255,0.15), rgba(77,166,255,0.05));
  }

  .speaker-results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  .speaker-card {
    background: rgba(8,5,26,0.8);
    border: 1px solid rgba(77,166,255,0.2);
    border-radius: 3px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.4s ease both;
  }

  .speaker-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px;
    color: #4da6ff;
    text-shadow: 0 0 20px rgba(77,166,255,0.5);
    min-width: 32px;
    text-align: center;
    line-height: 1;
  }

  .speaker-num.first {
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,162,39,0.6);
  }

  .speaker-info { flex: 1; }

  .speaker-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
  }

  .speaker-faction {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .speaker-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .speaker-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  /* Clickable faction row with expandable tip */
  .faction-row {
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s;
    margin-bottom: 8px;
  }

  .faction-row:last-child { margin-bottom: 0; }

  .faction-row:hover .faction-row-main {
    background: rgba(201,162,39,0.05);
  }

  .faction-row-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 2px;
    transition: background 0.15s;
  }

  .faction-row-chevron {
    font-size: 9px;
    color: var(--text-dim);
    margin-left: auto;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .faction-row.open .faction-row-chevron {
    transform: rotate(180deg);
  }

  .faction-row-tip {
    display: none;
    padding: 8px 10px 10px 26px;
    border-left: 2px solid rgba(201,162,39,0.2);
    margin: 0 8px 4px 8px;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
    animation: tipSlide 0.2s ease;
  }

  .faction-row.open .faction-row-tip { display: block; }

  @keyframes tipSlide {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Staggered card reveal */
  .final-card {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .final-card.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  /* Scrollable faction list */
  .faction-scroll {
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) transparent;
  }

  .faction-scroll::-webkit-scrollbar { width: 3px; }
  .faction-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 12px 28px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── CHEAT SHEET ── */
  .cs-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .cs-search {
    flex: 1; min-width: 200px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 2px;
    padding: 10px 14px; color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .cs-search:focus { border-color: rgba(201,162,39,0.5); }
  .cs-search::placeholder { color: var(--text-dim); opacity: 0.5; }
  .cs-filter {
    padding: 8px 14px; border: 1px solid rgba(201,162,39,0.2);
    background: transparent; color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border-radius: 2px; transition: all 0.2s; white-space: nowrap;
  }
  .cs-filter.active, .cs-filter:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,0.07); }
  .cs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .cs-card {
    background: rgba(8,5,26,0.85); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; transition: border-color 0.2s;
  }
  .cs-card:hover { border-color: rgba(201,162,39,0.45); }
  .cs-card.unverified { border-color: rgba(255,140,0,0.3); }
  .cs-card.unverified:hover { border-color: rgba(255,140,0,0.6); }
  .cs-header {
    display: flex; align-items: stretch; min-height: 84px;
    position: relative; overflow: hidden;
  }
  .cs-color-bar { width: 4px; flex-shrink: 0; }
  .cs-faction-img { width: 84px; height: 84px; object-fit: cover; flex-shrink: 0; filter: saturate(0.75) brightness(0.8); }
  .cs-faction-img-placeholder {
    width: 84px; height: 84px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 30px; opacity: 0.35;
  }
  .cs-header-info { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; }
  .cs-faction-name { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; color: var(--gold-light); line-height: 1.2; margin-bottom: 6px; }
  .cs-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .cs-exp-badge { font-size: 9px; letter-spacing: 1px; padding: 2px 6px; border-radius: 2px; font-weight: 700; text-transform: uppercase; background: rgba(255,255,255,0.07); color: var(--text-dim); }
  .cs-unverified-badge { font-size: 9px; letter-spacing: 1px; padding: 2px 6px; border-radius: 2px; font-weight: 700; background: rgba(255,140,0,0.15); color: #ff8c00; }
  .cs-body { padding: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
  .cs-section { margin-bottom: 12px; }
  .cs-section:last-child { margin-bottom: 0; }
  .cs-section-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 5px; }
  .cs-text { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--text); line-height: 1.5; }
  .cs-tech-list { display: flex; flex-direction: column; gap: 4px; }
  .cs-tech { display: flex; align-items: flex-start; gap: 7px; font-size: 13px; line-height: 1.4; }
  .cs-tech-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .tech-red { background: #cc4444; } .tech-blue { background: #4488cc; } .tech-green { background: #44aa66; } .tech-yellow { background: #ccaa22; }
  .cs-tech-name { color: var(--text); font-weight: 600; font-family: 'Rajdhani', sans-serif; }
  .cs-tech-desc { color: var(--text-dim); font-family: 'Rajdhani', sans-serif; }
  .cs-flagship { background: rgba(201,162,39,0.05); border: 1px solid rgba(201,162,39,0.15); border-radius: 3px; padding: 8px 10px; }
  .cs-flagship-name { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); margin-bottom: 3px; }
  .cs-flagship-stats { font-size: 12px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; margin-bottom: 4px; }
  .cs-flagship-ability { font-size: 13px; color: var(--text); font-family: 'Rajdhani', sans-serif; line-height: 1.4; }
  .cs-leader { display: flex; gap: 8px; margin-bottom: 6px; padding: 7px 9px; background: rgba(255,255,255,0.02); border-radius: 2px; border-left: 2px solid rgba(201,162,39,0.2); }
  .cs-leader:last-child { margin-bottom: 0; }
  .cs-leader-role { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; font-family: 'Rajdhani', sans-serif; color: var(--text-dim); white-space: nowrap; padding-top: 1px; min-width: 62px; }
  .cs-leader-body { flex: 1; }
  .cs-leader-name { font-family: 'Cinzel', serif; font-size: 11px; color: var(--text); margin-bottom: 2px; }
  .cs-leader-ability { font-size: 13px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; line-height: 1.4; }
  .cs-ability { font-size: 13px; color: var(--text); font-family: 'Rajdhani', sans-serif; line-height: 1.4; padding-left: 12px; position: relative; margin-bottom: 3px; }
  .cs-ability::before { content: '▸'; position: absolute; left: 0; color: var(--gold-dim); font-size: 9px; top: 2px; }
  .cs-empty { text-align: center; padding: 60px 20px; color: var(--text-dim); font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div style="position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;">
    <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">

      <!-- Warp burst lines -->
      <g class="warp-lines" style="opacity:0.12">
        <line x1="110" y1="110" x2="110" y2="10"  stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="197" y2="60"  stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="197" y2="160" stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="110" y2="210" stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="23"  y2="160" stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="23"  y2="60"  stroke="#c9a227" stroke-width="0.5"/>
        <line x1="110" y1="110" x2="155" y2="15"  stroke="#c9a227" stroke-width="0.3"/>
        <line x1="110" y1="110" x2="210" y2="110" stroke="#c9a227" stroke-width="0.3"/>
        <line x1="110" y1="110" x2="155" y2="205" stroke="#c9a227" stroke-width="0.3"/>
        <line x1="110" y1="110" x2="65"  y2="205" stroke="#c9a227" stroke-width="0.3"/>
        <line x1="110" y1="110" x2="10"  y2="110" stroke="#c9a227" stroke-width="0.3"/>
        <line x1="110" y1="110" x2="65"  y2="15"  stroke="#c9a227" stroke-width="0.3"/>
      </g>

      <!-- Outer dashed ring with nodes -->
      <g class="ring-outer">
        <circle cx="110" cy="110" r="95" stroke="#c9a227" stroke-width="0.75" stroke-dasharray="4 6" opacity="0.4"/>
        <!-- 6 node dots at hex points on r=95 -->
        <circle class="node-dot" cx="110"    cy="15"    r="3" fill="#c9a227"/>
        <circle class="node-dot" cx="192.3"  cy="57.5"  r="3" fill="#c9a227"/>
        <circle class="node-dot" cx="192.3"  cy="162.5" r="3" fill="#c9a227"/>
        <circle class="node-dot" cx="110"    cy="205"   r="3" fill="#c9a227"/>
        <circle class="node-dot" cx="27.7"   cy="162.5" r="3" fill="#c9a227"/>
        <circle class="node-dot" cx="27.7"   cy="57.5"  r="3" fill="#c9a227"/>
      </g>

      <!-- Mid ring -->
      <g class="ring-inner">
        <circle cx="110" cy="110" r="70" stroke="#c9a227" stroke-width="0.5" stroke-dasharray="2 8" opacity="0.3"/>
        <!-- tick marks -->
        <line x1="110" y1="40"  x2="110" y2="46"  stroke="#c9a227" stroke-width="1" opacity="0.5"/>
        <line x1="110" y1="174" x2="110" y2="180" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
        <line x1="40"  y1="110" x2="46"  y2="110" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
        <line x1="174" y1="110" x2="180" y2="110" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
      </g>

      <!-- Inner glow ring -->
      <circle cx="110" cy="110" r="50" stroke="#c9a227" stroke-width="1" opacity="0.15"/>

      <!-- Scanning sweep line -->
      <g class="scan-line">
        <line x1="110" y1="110" x2="110" y2="20" stroke="url(#scanGrad)" stroke-width="1.5" opacity="0.8"/>
      </g>

      <!-- Core hexagon -->
      <g class="hex-core">
        <!-- Hex shape: flat-top, r=38 -->
        <polygon
          points="110,72 142.9,91 142.9,129 110,148 77.1,129 77.1,91"
          stroke="#c9a227" stroke-width="1.5" fill="rgba(201,162,39,0.05)"
          filter="url(#hexGlow)"
        />
        <!-- Inner hex -->
        <polygon
          points="110,83 130.8,94.5 130.8,117.5 110,129 89.2,117.5 89.2,94.5"
          stroke="#c9a227" stroke-width="0.75" fill="rgba(201,162,39,0.08)" opacity="0.6"
        />
        <!-- Centre dot -->
        <circle cx="110" cy="110" r="4" fill="#c9a227" opacity="0.9" filter="url(#hexGlow)"/>
        <!-- TI-style cross hairs -->
        <line x1="110" y1="90"  x2="110" y2="100" stroke="#c9a227" stroke-width="0.75" opacity="0.5"/>
        <line x1="110" y1="120" x2="110" y2="130" stroke="#c9a227" stroke-width="0.75" opacity="0.5"/>
        <line x1="90"  y1="110" x2="100" y2="110" stroke="#c9a227" stroke-width="0.75" opacity="0.5"/>
        <line x1="120" y1="110" x2="130" y2="110" stroke="#c9a227" stroke-width="0.75" opacity="0.5"/>
      </g>

      <defs>
        <radialGradient id="scanGrad" cx="50%" cy="100%" r="100%">
          <stop offset="0%" stop-color="#c9a227" stop-opacity="0"/>
          <stop offset="100%" stop-color="#c9a227" stop-opacity="0.9"/>
        </radialGradient>
        <filter id="hexGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
  </div>

  <div style="text-align:center">
    <div class="loader-title">Calculating Fates</div>
    <div class="loader-sub" id="loader-sub-text">Scanning the galaxy…</div>
  </div>
</div>

<div class="container">
  <header>
    <div class="title-eyebrow">Prophecy of Kings · Thunder's Edge · Discordant Stars</div>
    <h1>Twilight Imperium</h1>
    <div class="subtitle">Faction Draft System</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
  </header>

  <!-- Tab Nav -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('draft')">⬡ Draft</button>
    <button class="tab-btn" onclick="switchTab('cheatsheet')">⬡ Faction Guide</button>
  </nav>

  <!-- Draft Tab -->
  <div id="tab-draft" class="tab-pane active">
  <div id="config-panel">
    <!-- Expansions -->
    <div class="panel">
      <div class="panel-title">▸ Expansions &amp; Content</div>
      <div class="expansion-grid" id="exp-grid"></div>
    </div>

    <!-- Player Names -->
    <div class="panel">
      <div class="panel-title">▸ Player Names</div>
      <div class="player-names-grid" id="names-grid"></div>
    </div>

    <!-- Players & Mode -->
    <div class="panel">
      <div class="panel-title">▸ Draft Configuration</div>
      <div class="player-row">
        <label>Players</label>
        <div class="player-stepper">
          <button class="stepper-btn" onclick="adjustPlayers(-1)">−</button>
          <div class="stepper-val" id="player-count">6</div>
          <button class="stepper-btn" onclick="adjustPlayers(1)">+</button>
        </div>
        <label style="margin-left:20px">Factions per player</label>
        <div class="player-stepper">
          <button class="stepper-btn" onclick="adjustPerPlayer(-1)">−</button>
          <div class="stepper-val" id="per-player-count">3</div>
          <button class="stepper-btn" onclick="adjustPerPlayer(1)">+</button>
        </div>
      </div>

      <div class="draft-options" style="margin-top:20px">
        <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:2px;width:100%;margin-bottom:4px">DRAFT MODE</div>
        <button class="option-btn active" id="mode-random" onclick="setMode('random')">Random Assign</button>
        <button class="option-btn" id="mode-draft" onclick="setMode('draft')">Pick from Options</button>
      </div>
    </div>

    <button class="draft-btn" onclick="startDraft()">⬡ BEGIN THE DRAFT ⬡</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div id="results-random" style="display:none">
      <div class="results-header">— The Galaxy Has Spoken —</div>
      <div class="player-results" id="random-results"></div>
      <div id="speaker-section" style="display:none">
        <div class="divider" style="margin:24px auto"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
        <button class="speaker-btn" onclick="rollSpeakerOrder()">⬡ Randomize Speaker Order ⬡</button>
        <div id="speaker-results"></div>
      </div>
      <div class="action-row" style="margin-top:24px">
        <button class="action-btn primary" onclick="startDraft()">Redraft</button>
        <button class="action-btn secondary" onclick="resetAll()">← Back to Config</button>
      </div>
    </div>

    <div id="results-draft" style="display:none">
      <div class="results-header">— Choose Your Destiny —</div>
      <div class="status-bar" id="draft-status"></div>
      <div id="draft-warning" class="warning" style="display:none"></div>
      <div class="player-results" id="draft-results"></div>
      <div class="action-row" style="margin-top:8px">
        <button class="action-btn secondary" onclick="resetAll()">← Back to Config</button>
      </div>
    </div>
  </div>

  </div> <!-- /tab-draft -->

  <!-- Cheat Sheet Tab -->
  <div id="tab-cheatsheet" class="tab-pane">
    <div class="cs-controls">
      <input class="cs-search" id="cs-search" type="text" placeholder="Search factions…" oninput="renderCheatSheet()">
      <button class="cs-filter active" data-filter="all" onclick="setCSFilter(this,'all')">All</button>
      <button class="cs-filter" data-filter="base" onclick="setCSFilter(this,'base')">Base</button>
      <button class="cs-filter" data-filter="pok" onclick="setCSFilter(this,'pok')">PoK</button>
      <button class="cs-filter" data-filter="te" onclick="setCSFilter(this,'te')">Thunder's Edge</button>
    </div>
    <div class="cs-grid" id="cs-grid"></div>
  </div>

</div><!-- /container -->

<script>
// ─── PLAYSTYLE TIPS ──────────────────────────────────────────────────────────
const FACTION_TIPS = {

function revealCards(container, onDone) {
  const cards = container.querySelectorAll('.final-card');
  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add('revealed');
      if (i === cards.length - 1 && onDone) onDone();
    }, 150 + i * 200);
  });

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  renderExpansions();
  renderNames();
}

function renderExpansions() {
  const grid = document.getElementById('exp-grid');
  grid.innerHTML = '';
  EXPANSIONS.forEach(exp => {
    const count = FACTIONS[exp.id].length;
    const el = document.createElement('div');
    el.className = 'exp-toggle' + (state.expansions[exp.id] ? ' active' : '');
    if (exp.required) el.style.opacity = '0.6';
    el.innerHTML = `
      <div class="toggle-box"><span class="toggle-check">✓</span></div>
      <span class="exp-name">${exp.name}</span>
      <span class="exp-count">${count}f</span>
    `;
    if (!exp.required) {
      el.onclick = () => {
        state.expansions[exp.id] = !state.expansions[exp.id];
        el.classList.toggle('active', state.expansions[exp.id]);
      };
    }
    grid.appendChild(el);
  });
}

function renderNames() {
  const grid = document.getElementById('names-grid');
  grid.innerHTML = '';
  for (let i = 0; i < state.players; i++) {
    const field = document.createElement('div');
    field.className = 'name-field';
    field.innerHTML = `
      <div class="name-label">Player ${i + 1}</div>
      <input class="name-input" type="text" maxlength="20" placeholder="Enter name…"
        value="${state.names[i] || ''}"
        oninput="state.names[${i}] = this.value.trim()"
      />
    `;
    grid.appendChild(field);
  }
}

function adjustPlayers(d) {
  state.players = Math.max(2, Math.min(8, state.players + d));
  document.getElementById('player-count').textContent = state.players;
  renderNames();
}

function adjustPerPlayer(d) {
  state.perPlayer = Math.max(1, Math.min(5, state.perPlayer + d));
  document.getElementById('per-player-count').textContent = state.perPlayer;
}

function setMode(m) {
  state.mode = m;
  document.getElementById('mode-random').classList.toggle('active', m === 'random');
  document.getElementById('mode-draft').classList.toggle('active', m === 'draft');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAvailableFactions() {
  let pool = [];
  Object.keys(state.expansions).forEach(k => {
    if (state.expansions[k]) pool = pool.concat(FACTIONS[k]);
  });
  return pool;
}

function playerName(idx) {
  return (state.names[idx] && state.names[idx].trim()) ? state.names[idx].trim() : `Player ${idx + 1}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function factionColor(name) {
  return FACTION_COLORS[name] || '#888888';
}

function factionExpBadge(name) {
  for (const [k, list] of Object.entries(FACTIONS)) {
    if (list.includes(name)) {
      const exp = EXPANSIONS.find(e => e.id === k);
      if (exp && k !== 'base') {
        return `<span class="faction-exp-badge" style="background:rgba(255,255,255,0.08);color:var(--text-dim)">${exp.short}</span>`;
      }
    }
  }
  return '';
}

function getExpName(faction) {
  for (const [k, list] of Object.entries(FACTIONS)) {
    if (list.includes(faction)) {
      const exp = EXPANSIONS.find(e => e.id === k);
      return exp ? exp.name : '';
    }
  }
  return '';
}

// ─── DRAFT LOGIC ─────────────────────────────────────────────────────────────
const LOADER_LINES = [
  'Scanning the galaxy…',
  'Consulting the oracle…',
  'Aligning hyperlanes…',
  'Awakening ancient races…',
  'Charting the Mecatol system…',
  'Shuffling the fates…',
  'The Prophecy stirs…',
];

function startDraft() {
  const available = getAvailableFactions();
  const needed = state.players * state.perPlayer;

  const overlay = document.getElementById('loading-overlay');
  const subText = document.getElementById('loader-sub-text');
  overlay.classList.add('active');

  let lineIdx = 0;
  const cycleText = setInterval(() => {
    lineIdx = (lineIdx + 1) % LOADER_LINES.length;
    subText.textContent = LOADER_LINES[lineIdx];
  }, 400);

  setTimeout(() => {
    clearInterval(cycleText);
    overlay.classList.remove('active');

    document.getElementById('config-panel').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('speaker-section').style.display = 'none';
    document.getElementById('speaker-results').innerHTML = '';

    if (state.mode === 'random') {
      doRandomDraft(available);
    } else {
      doDraftMode(available, needed);
    }
  }, 2200);
}

function factionRowHTML(f) {
  const tip = FACTION_TIPS[f];
  return `
    <div class="faction-row" onclick="toggleFactionTip(this)">
      <div class="faction-row-main">
        <div class="assigned-dot" style="background:${factionColor(f)}"></div>
        <div style="flex:1">
          <div class="assigned-name">${f}</div>
          <div class="assigned-exp">${getExpName(f)}</div>
        </div>
        ${tip ? `<span class="playstyle-tag tag-${tip.tag}" style="margin-right:4px">${TAG_LABELS[tip.tag]}</span>` : ''}
        ${tip ? `<span class="faction-row-chevron">▼</span>` : ''}
      </div>
      ${tip ? `<div class="faction-row-tip">${tip.tip}</div>` : ''}
    </div>
  `;
}

function doRandomDraft(available) {
  document.getElementById('results-random').style.display = 'block';
  document.getElementById('results-draft').style.display = 'none';

  const shuffled = shuffle(available);
  const needed = state.players * state.perPlayer;
  const warn = needed > available.length;

  const container = document.getElementById('random-results');
  container.innerHTML = '';

  if (warn) {
    const w = document.createElement('div');
    w.className = 'warning';
    w.textContent = `⚠ Only ${available.length} factions available — some players may receive fewer options.`;
    container.before(w);
  }

  state.finalFactions = [];

  for (let p = 0; p < state.players; p++) {
    const playerFactions = shuffled.slice(p * state.perPlayer, (p + 1) * state.perPlayer);
    state.finalFactions.push({ name: playerName(p), faction: playerFactions[0] || null, options: playerFactions });

    const card = document.createElement('div');
    card.className = 'final-card';
    card.innerHTML = `
      <div class="player-num">${playerName(p)}</div>
      ${playerFactions.map(f => factionRowHTML(f)).join('')}
    `;
    container.appendChild(card);
  }

  revealCards(container, () => {
    document.getElementById('speaker-section').style.display = 'block';
  });
}

function doDraftMode(available, needed) {
  document.getElementById('results-random').style.display = 'none';
  document.getElementById('results-draft').style.display = 'block';

  const shuffled = shuffle(available);
  const pool = shuffled.slice(0, Math.min(needed, available.length));

  state.draftPool = pool;
  state.assignments = Array.from({ length: state.players }, (_, i) => ({
    player: i + 1,
    name: playerName(i),
    factionOptions: pool.slice(i * state.perPlayer, (i + 1) * state.perPlayer),
    chosen: null,
  }));
  state.currentPlayer = 0;
  state.finalFactions = [];

  const warn = needed > available.length;
  const warnEl = document.getElementById('draft-warning');
  if (warn) {
    warnEl.style.display = 'block';
    warnEl.textContent = `⚠ Only ${available.length} factions available — some players may have fewer choices.`;
  } else {
    warnEl.style.display = 'none';
  }

  renderDraftState();
}

function renderDraftState() {
  updateDraftStatus();
  const container = document.getElementById('draft-results');
  container.innerHTML = '';

  state.assignments.forEach((assignment, idx) => {
    const card = document.createElement('div');
    card.className = 'player-card';

    if (assignment.chosen) {
      card.innerHTML = `
        <div class="player-num">${assignment.name}</div>
        ${factionRowHTML(assignment.chosen)}
      `;
    } else if (idx === state.currentPlayer) {
      card.style.borderColor = 'rgba(201,162,39,0.5)';
      card.style.background = 'rgba(201,162,39,0.05)';
      const chosenByOthers = state.assignments.filter(a => a.chosen).map(a => a.chosen);

      card.innerHTML = `
        <div class="player-num" style="color:var(--gold)">${assignment.name} — Choose Your Faction</div>
        <div class="faction-scroll">
          <div class="faction-options" id="options-${idx}">
            ${assignment.factionOptions.map(f => {
              const locked = chosenByOthers.includes(f);
              const tip = FACTION_TIPS[f];
              return `<div class="faction-option${locked ? ' locked' : ''}" onclick="selectFaction(${idx}, '${f.replace(/'/g, "\\'")}')">
                <div class="faction-color" style="background:${factionColor(f)}"></div>
                <div style="flex:1">
                  <span class="faction-name-text">${f}</span>
                  ${tip ? `<div class="faction-tip"><div class="playstyle-tag tag-${tip.tag}">${TAG_LABELS[tip.tag]}</div><br>${tip.tip}</div>` : ''}
                </div>
                ${factionExpBadge(f)}
              </div>`;
            }).join('')}
          </div>
        </div>
        <button class="confirm-btn" id="confirm-${idx}" disabled onclick="confirmFaction(${idx})">Confirm Selection</button>
      `;
    } else {
      card.style.opacity = '0.5';
      card.innerHTML = `
        <div class="player-num">${assignment.name}</div>
        <div style="font-size:13px;color:var(--text-dim);font-style:italic">Awaiting their turn…</div>
      `;
    }

    container.appendChild(card);
  });
}

let pendingChoice = {};

function selectFaction(playerIdx, faction) {
  pendingChoice[playerIdx] = faction;
  document.querySelectorAll(`#options-${playerIdx} .faction-option`).forEach(el => {
    el.classList.toggle('selected', el.querySelector('.faction-name-text').textContent === faction);
  });
  const btn = document.getElementById(`confirm-${playerIdx}`);
  if (btn) btn.disabled = false;
}

function confirmFaction(playerIdx) {
  const chosen = pendingChoice[playerIdx];
  if (!chosen) return;
  state.assignments[playerIdx].chosen = chosen;
  delete pendingChoice[playerIdx];
  state.currentPlayer++;
  if (state.currentPlayer >= state.players) {
    showFinalResults();
  } else {
    renderDraftState();
  }
}

function showFinalResults() {
  document.getElementById('results-draft').style.display = 'none';
  document.getElementById('results-random').style.display = 'block';
  document.getElementById('results-random').querySelector('.results-header').textContent = '— Factions Chosen —';

  const container = document.getElementById('random-results');
  container.innerHTML = '';
  state.finalFactions = [];

  state.assignments.forEach((a) => {
    state.finalFactions.push({ name: a.name, faction: a.chosen });
    const card = document.createElement('div');
    card.className = 'final-card';
    card.innerHTML = `
      <div class="player-num">${a.name}</div>
      ${factionRowHTML(a.chosen)}
    `;
    container.appendChild(card);
  });

  revealCards(container, () => {
    document.getElementById('speaker-section').style.display = 'block';
  });
}

          ${player.faction ? `<div class="speaker-dot" style="background:${factionColor(player.faction)}"></div>${player.faction}` : '—'}

      </div>
      ${isFirst ? `<div style="font-size:10px;letter-spacing:2px;color:var(--gold);font-family:'Cinzel',serif">SPEAKER</div>` : ''}

function updateDraftStatus() {
  const done = state.assignments.filter(a => a.chosen).length;
  const el = document.getElementById('draft-status');
  if (el) el.innerHTML = `<span>${done}</span> of <span>${state.players}</span> players have selected · <span>${state.assignments[state.currentPlayer]?.name || ''}</span> is choosing`;

function resetAll() {
  document.getElementById('config-panel').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results-random').style.display = 'none';
  document.getElementById('results-draft').style.display = 'none';
  document.getElementById('random-results').innerHTML = '';
  document.getElementById('speaker-results').innerHTML = '';
  document.getElementById('speaker-section').style.display = 'none';
  const old = document.querySelector('.container > .warning');
  if (old) old.remove();
  const rh = document.querySelector('#results-random .results-header');
  if (rh) rh.textContent = '— The Galaxy Has Spoken —';
  state.currentPlayer = 0;
  state.finalFactions = [];
  pendingChoice = {};
  if (animFrame) { cancelAnimationFrame(animFrame); }
}

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick').includes(tab)) b.classList.add('active');
  });
  if (tab === 'cheatsheet') renderCheatSheet();
}

// ─── CHEAT SHEET DATA ────────────────────────────────────────────────────────
let csActiveFilter = 'all';

function setCSFilter(el, filter) {
  csActiveFilter = filter;
  document.querySelectorAll('.cs-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCheatSheet();
}

function renderCheatSheet() {
  const query = (document.getElementById('cs-search')?.value || '').toLowerCase();
  const grid = document.getElementById('cs-grid');
  if (!grid) return;

  const filtered = FACTION_DB.filter(f => {
    const matchFilter = csActiveFilter === 'all' || f.exp === csActiveFilter;
    const matchSearch = !query || f.name.toLowerCase().includes(query) || f.playstyle.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="cs-empty">No factions match your search.</div>';
    return;
  }

  grid.innerHTML = filtered.map(f => csCardHTML(f)).join('');
}

function expLabel(exp) {
  return { base: 'Base Game', pok: 'Prophecy of Kings', codex3: 'Codex III', te: "Thunder's Edge" }[exp] || exp;
}

function csCardHTML(f) {
  const imgUrl = csImageUrl(f);
  const colorBar = `<div style="height:3px;background:${f.color};opacity:0.8;"></div>`;

  const imgHTML = imgUrl
    ? `<img class="cs-faction-img" src="${imgUrl}" alt="${f.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="cs-faction-img-placeholder" style="${imgUrl ? 'display:none' : ''}">${f.emoji}</div>`;

  const techs = f.techs.map(t => `
    <div class="cs-tech">
      <div class="cs-tech-dot tech-${t.color}"></div>
      <div><span class="cs-tech-name">${t.name}: </span><span class="cs-tech-desc">${t.desc}</span></div>
    </div>`).join('');

  const abilities = f.abilities.map(a => `<div class="cs-ability">${a}</div>`).join('');

  const leaders = [
    f.commander ? { role: 'Commander', name: f.commander.name, ability: f.commander.ability } : null,
    f.hero ? { role: 'Hero', name: f.hero.name, ability: f.hero.ability } : null,
  ].filter(Boolean).map(l => `
    <div class="cs-leader">
      <div class="cs-leader-role">${l.role}</div>
      <div class="cs-leader-body">
        <div class="cs-leader-name">${l.name}</div>
        <div class="cs-leader-ability">${l.ability}</div>
      </div>
    </div>`).join('');

  return `
  <div class="cs-card${f.unverified ? ' unverified' : ''}">
    ${colorBar}
    <div class="cs-header">
      ${imgHTML}${placeholder}
      <div class="cs-header-info" style="background:linear-gradient(to right, ${f.color}22, transparent)">
        <div class="cs-faction-name">${f.name}</div>
        <div class="cs-badges">
          <span class="cs-exp-badge">${expLabel(f.exp)}</span>
          ${f.unverified ? '<span class="cs-unverified-badge">⚠ Verify stats</span>' : ''}
          ${FACTION_TIPS[f.name] ? `<span class="playstyle-tag tag-${FACTION_TIPS[f.name].tag}">${TAG_LABELS[FACTION_TIPS[f.name].tag]}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="cs-body">
      <div class="cs-section">
        <div class="cs-section-label">Playstyle</div>
        <div class="cs-text">${f.playstyle}</div>
      </div>
      <div class="cs-section">
        <div class="cs-section-label">Faction Abilities</div>
        ${abilities}
      </div>
      <div class="cs-section">
        <div class="cs-section-label">Flagship — ${f.flagship.name}</div>
        <div class="cs-flagship">
          <div class="cs-flagship-stats">${f.flagship.stats}</div>
          <div class="cs-flagship-ability">${f.flagship.ability}</div>
        </div>
      </div>
      <div class="cs-section">
        <div class="cs-section-label">Faction Technologies</div>
        <div class="cs-tech-list">${techs}</div>
      </div>
      <div class="cs-section">
        <div class="cs-section-label">Leaders</div>
        ${leaders}
      </div>
    </div>
  </div>`;
}

function csImageUrl(f) {
  // Use Twilight Imperium wiki faction art (public domain fan wiki images)
  const wikiNames = {
    'arborec': 'Arborec', 'letnev': 'Letnev', 'saar': 'Saar', 'muaat': 'Muaat',
    'hacan': 'Hacan', 'sol': 'Sol', 'creuss': 'Creuss', 'l1z1x': 'L1Z1X',
    'mentak': 'Mentak', 'naalu': 'Naalu', 'nekro': 'Nekro', 'sardakk': 'Sardakk',
    'jolnar': 'Jol-Nar', 'winnu': 'Winnu', 'xxcha': 'Xxcha', 'yin': 'Yin',
    'yssaril': 'Yssaril', 'argent': 'Argent', 'empyrean': 'Empyrean',
    'mahact': 'Mahact', 'naazrokha': 'Naaz-Rokha', 'nomad': 'Nomad',
    'titans': 'Titans', 'vuil': 'Vuil\'raith', 'keleres': 'Keleres',
  };
  // We'll use the TI4 reference card art from the wiki
  const name = wikiNames[f.id];
  if (!name) return null;
  return `https://twilight-imperium.fandom.com/wiki/Special:FilePath/${encodeURIComponent(name + '_faction_icon.png')}`;
}
